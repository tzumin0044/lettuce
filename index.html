<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>生菜標籤管理系統 v12.6</title>
    <style>
        /* --- 控制面板 --- */
        .controls { background: #f8f9fa; padding: 20px; border-bottom: 2px solid #ddd; font-family: sans-serif; }
        @media print { .no-print { display: none; } }

        table { border-collapse: collapse; width: 100%; max-width: 1000px; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #eee; font-size: 14px; }
        .product-name { text-align: left; font-weight: bold; width: 160px; color: #333; }
        
        input[type="number"], input[type="date"] { padding: 6px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        input[type="number"] { width: 70px; text-align: center; font-weight: bold; }

        /* --- 標籤核心尺寸設定 --- */
        .label-page {
            background: white;
            display: inline-block;
            box-sizing: border-box;
            position: relative; 
            overflow: hidden;
            color: black;
            border: 1px dashed #ccc; 
            margin: 5px;
            vertical-align: top;
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
        }

        .box-size { width: 84.9mm; height: 62.4mm; }
        .spec-size { width: 35mm; height: 25mm; }

        @media print {
            body { background: white; padding: 0; margin: 0; }
            .label-page { border: none; margin: 0; page-break-after: always; display: block; }
        }

        /* --- 外箱貼排版 --- */
        .box-label .date-area {
            position: absolute; top: 5mm; left: 7mm; text-align: left; line-height: 1.2;
        }
        .box-label .info-row { font-size: 20pt; font-weight: bold; white-space: nowrap; }

        .box-label .spec-main {
            position: absolute; width: 100%; top: 48%; transform: translateY(-50%);
            text-align: center; font-size: 34pt; font-weight: 900;
        }

        .box-label .footer-name { 
            position: absolute; 
            bottom: 6mm; 
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 10; 
        }
        
        .box-label .name-border { 
            border: 5px solid black; 
            text-align: center; 
            font-size: 34pt; 
            font-weight: 900; 
            padding: 3px 10px; 
            background: white;
            box-sizing: border-box;
            /* 強化：寬度縮減為標籤寬度減去 16mm (左右各留 8mm 緩衝) */
            width: calc(100% - 16mm); 
        }

        /* --- 品規貼排版 --- */
        .spec-label .name-top {
            position: absolute; width: 100%; top: 2mm; text-align: center; font-weight: 900; white-space: nowrap;
        }
        .spec-label .spec-big {
            position: absolute; width: 100%; bottom: 2mm; text-align: center; font-size: 23pt; font-weight: 900;
        }

        /* 按鈕樣式 */
        button { padding: 10px 20px; font-size: 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin-right: 8px; }
        .btn-preview { background: #007bff; color: white; }
        .btn-print { background: #28a745; color: white; }
        .btn-clear { background: #dc3545; color: white; }
    </style>
</head>
<body>

<div class="controls no-print">
    <h2>生菜標籤管理系統 v12.6</h2>
    <div style="margin-bottom: 15px;">
        <strong>製作日期 (統一)：</strong>
        <input type="date" id="packDate">
        &nbsp;&nbsp;
        <strong>模式：</strong>
        <select id="labelMode" onchange="generatePreview()">
            <option value="box" selected>外箱貼 (84.9x62.4)</option>
            <option value="spec">品規貼 (35x25)</option>
        </select>
    </div>

    <table id="inputTable">
        <thead>
            <tr>
                <th>製作品項</th>
                <th>原料日期</th>
                <th>1kg 數量(3入)</th>
                <th>300g 數量(10入)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div style="margin-top: 20px;">
        <button class="btn-preview" onclick="generatePreview()">產生預覽</button>
        <button class="btn-print" onclick="window.print()">確認列印</button>
        <button class="btn-clear" onclick="clearNumbers()">清除數字</button>
    </div>
</div>

<div id="printArea"></div>

<script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('packDate').value = today;

    const productList = ["紅捲", "綠捲鬚", "紅橡木", "綠橡木", "紅火焰", "綠火焰", "紅蘿蔓", "奶油生菜", "羽衣甘藍", "歐芹", "紅包心生菜"];

    const tbody = document.getElementById('tableBody');
    productList.forEach(name => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td class="product-name">${name}</td>
            <td><input type="date" class="row-source-date" value="${today}"></td>
            <td><input type="number" class="qty-1k" value="0" min="0"></td>
            <td><input type="number" class="qty-300g" value="0" min="0"></td>
        `;
        tbody.appendChild(row);
    });

    function formatDate(dateStr, isMonthOnly = false) {
        if(!dateStr) return "";
        const [y, m, d] = dateStr.split('-');
        return isMonthOnly ? `${m}/` : `${m}/${d}`;
    }

    function clearNumbers() {
        if(confirm("確定要將所有數量歸零嗎？")) {
            document.querySelectorAll('.qty-1k, .qty-300g').forEach(input => input.value = 0);
            document.getElementById('printArea').innerHTML = "";
        }
    }

    function generatePreview() {
        const mode = document.getElementById('labelMode').value;
        const pDate = formatDate(document.getElementById('packDate').value); 
        const printArea = document.getElementById('printArea');
        printArea.innerHTML = ""; 

        document.querySelectorAll('#tableBody tr').forEach(row => {
            const name = row.querySelector('.product-name').innerText;
            const sMonth = formatDate(row.querySelector('.row-source-date').value, true);
            const q1k = parseInt(row.querySelector('.qty-1k').value) || 0;
            const q300 = parseInt(row.querySelector('.qty-300g').value) || 0;

            if (mode === 'spec') {
                for(let i=0; i<q1k; i++) printArea.innerHTML += createSpecHTML(name, "1K");
                for(let i=0; i<q300; i++) printArea.innerHTML += createSpecHTML(name, "300g");
            } else {
                if (q1k > 0) {
                    const full = Math.floor(q1k / 3), rem = q1k % 3;
                    for(let i=0; i<full; i++) printArea.innerHTML += createBoxHTML(name, "1KG*3包", sMonth, pDate);
                    if(rem > 0) printArea.innerHTML += createBoxHTML(name, `1KG*${rem}包`, sMonth, pDate);
                }
                if (q300 > 0) {
                    const full = Math.floor(q300 / 10), rem = q300 % 10;
                    for(let i=0; i<full; i++) printArea.innerHTML += createBoxHTML(name, "300G*10包", sMonth, pDate);
                    if(rem > 0) printArea.innerHTML += createBoxHTML(name, `300G*${rem}包`, sMonth, pDate);
                }
            }
        });
    }

    function createBoxHTML(name, specText, sMonth, pDate) {
        return `<div class="label-page box-size box-label">
            <div class="date-area">
                <div class="info-row">原料日期：${sMonth}</div>
                <div class="info-row">製作日期：${pDate}</div>
            </div>
            <div class="spec-main">${specText}</div>
            <div class="footer-name"><div class="name-border">${name}</div></div>
        </div>`;
    }

    function createSpecHTML(name, shortSpec) {
        let fontSize = "23pt"; 
        if (name.length === 4) fontSize = "18pt";
        else if (name.length >= 5) fontSize = "14pt";

        return `<div class="label-page spec-size spec-label">
            <div class="name-top" style="font-size: ${fontSize};">${name}</div>
            <div class="spec-big">${shortSpec}</div>
        </div>`;
    }
</script>

</body>
</html>
